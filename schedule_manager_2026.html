<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Schedule Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .container {
            padding: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #444;
            text-align: left;
        }
        th {
            background-color: #444;
        }
        tr:nth-child(even) {
            background-color: #222;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Client Schedule Manager</h1>
        <input type="text" id="search" placeholder="Search clients...">
        <table id="clientTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Appointment</th>
                </tr>
            </thead>
            <tbody>
                <!-- Client Data Rows Go Here -->
            </tbody>
        </table>
    </div>
    <script>
        const clients = Array.from({length: 104}, (_, i) => ({
            name: `Client ${i + 1}`,
            appointment: `Appointment ${i + 1}`
        }));

        const clientTableBody = document.getElementById('clientTable').getElementsByTagName('tbody')[0];

        function displayClients(filteredClients) {
            clientTableBody.innerHTML = '';
            filteredClients.forEach(client => {
                const row = clientTableBody.insertRow();
                const nameCell = row.insertCell(0);
                const appointmentCell = row.insertCell(1);
                nameCell.textContent = client.name;
                appointmentCell.textContent = client.appointment;
            });
        }

        document.getElementById('search').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredClients = clients.filter(client => client.name.toLowerCase().includes(searchTerm));
            displayClients(filteredClients);
        });

        displayClients(clients); // Initially display all clients
    </script>
</body>
</html>
