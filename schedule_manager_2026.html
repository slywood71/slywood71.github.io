// ─── Schedule engine ──────────────────────────────────────────────────────────
function getWD(){const d=[],s=new Date(2026,0,5),e=new Date(2026,11,31),n=new Date(s);while(n<=e){const k=n.toISOString().slice(0,10);if(n.getDay()>=1&&n.getDay()<=5&&!HOLIDAYS.has(k))d.push(new Date(n));n.setDate(n.getDate()+1);}return d;}
const WD=getWD();
const dk=d=>d.toISOString().slice(0,10);
function hav(a,b,c,d){const R=6371,dl=(c-a)*Math.PI/180,dn=(d-b)*Math.PI/180,f=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dn/2)**2;return R*2*Math.asin(Math.sqrt(f));}

function buildBase(clients,{wmDays,biweekly,tiers,maxPD}){
  const cm={};clients.forEach(c=>{cm[c.id]=c;});
  // Start from after CUTOFF for generated visits, seed visit tracking from ACTUAL
  const sc={};
  // Fill in all working days
  WD.forEach(d=>{sc[dk(d)]=[];});
  // Lock in actual data for dates up to CUTOFF
  for(const[k,ids] of Object.entries(ACTUAL)){sc[k]=[...ids];}

  // For the generated portion (after cutoff), we need to know last visit dates
  // from actual data to continue schedules properly
  const lastVisit={};
  for(const[k,ids] of Object.entries(ACTUAL)){
    for(const id of ids){
      if(!lastVisit[id]||k>lastVisit[id])lastVisit[id]=k;
    }
  }

  const futureWD=WD.filter(d=>dk(d)>CUTOFF);
  const wi={};futureWD.forEach((d,i)=>{wi[dk(d)]=i;});
  const bw={0:[],1:[],2:[],3:[],4:[]};futureWD.forEach(d=>{bw[d.getDay()-1].push(dk(d));});

  function ctr(ids){if(!ids.length)return null;const la=ids.map(id=>cm[id]?.la||45.7),lo=ids.map(id=>cm[id]?.lo||-73.9);return[la.reduce((a,b)=>a+b)/la.length,lo.reduce((a,b)=>a+b)/lo.length];}
  function slot(c,fromDk,ad){
    let p=wi[fromDk]??futureWD.findIndex(d=>dk(d)>=fromDk);if(p<0||p>=futureWD.length)return null;
    let bst=null,bs=1e9;
    for(let i=0;i<Math.min(14,futureWD.length-p);i++){const day=futureWD[p+i],k=dk(day),wd=DAYS[day.getDay()-1];if(ad?.length&&!ad.includes(wd))continue;if(sc[k].length>=maxPD)continue;const ct=ctr(sc[k].map(id=>id)),ds=ct?hav(c.la,c.lo,ct[0],ct[1]):0,s=ds+i*2;if(s<bs){bs=s;bst=k;}}
    if(bst)return bst;
    for(let i=0;i<futureWD.length-p;i++){const day=futureWD[p+i],k=dk(day),wd=DAYS[day.getDay()-1];if(ad?.length&&!ad.includes(wd))continue;if(sc[k].length<maxPD)return k;}
    return null;
  }
  function nextDateAfter(fromDk, weeks){const d=new Date(fromDk);d.setDate(d.getDate()+weeks*7);return dk(d);}

  // Walmart - only future dates
  clients.filter(c=>c.b==="Wal-Mart").forEach(c=>{
    const n=c.n.toUpperCase();let day=null;for(const[k,v]of Object.entries(wmDays)){if(n.includes(k)){day=v;break;}}
    if(!day)return;const wi2=DAYS.indexOf(day);if(wi2<0)return;
    bw[wi2].forEach(k=>{if(sc[k].length<maxPD)sc[k].push(c.id);});
  });

  // BEG quarterly - only future
  const qT=["2026-04-13","2026-07-13","2026-10-12"];
  clients.filter(c=>c.b==="Bureau en Gros").sort((a,b)=>a.la-b.la).forEach((c,ci)=>{
    qT.forEach(qt=>{for(let dd=ci;dd<ci+20;dd++){const d=new Date(qt);d.setDate(d.getDate()+dd);if(d.getDay()===0||d.getDay()===6)continue;const k=dk(d),wd=DAYS[d.getDay()-1];if(HOLIDAYS.has(k))continue;if(c.d.length&&!c.d.includes(wd))continue;if(sc[k]&&sc[k].length<maxPD){sc[k].push(c.id);break;}}});
  });

  // Bi-weekly CT/Maxi - continue from last actual visit or start fresh
  clients.filter(c=>biweekly.has(c.n.toUpperCase())).sort((a,b)=>a.la-b.la).forEach((c,i)=>{
    const last=lastVisit[c.id];
    let startDk=last?nextDateAfter(last,2):"2026-02-23";
    // stagger a bit
    const sd=new Date(startDk);sd.setDate(sd.getDate()+(i%3)*2);startDk=dk(sd);
    let vd=new Date(startDk);
    while(dk(vd)<="2026-12-31"){const ch=slot(c,dk(vd),c.d);if(!ch)break;sc[ch].push(c.id);const nd=new Date(ch);nd.setDate(nd.getDate()+14);vd=nd;}
  });

  // Others - tier-based, continue from last actual visit
  const oth=clients.filter(c=>c.b!=="Wal-Mart"&&c.b!=="Bureau en Gros"&&!biweekly.has(c.n.toUpperCase())).sort((a,b)=>{const fa=tiers.find(t=>a.p>=t.min)?.weeks||13,fb=tiers.find(t=>b.p>=t.min)?.weeks||13;return fa-fb||a.la-b.la;});
  oth.forEach((c,i)=>{
    const freq=tiers.find(t=>c.p>=t.min)?.weeks||13;
    const last=lastVisit[c.id];
    let startDk=last?nextDateAfter(last,freq):"2026-02-23";
    // small stagger to spread load
    const sd=new Date(startDk);sd.setDate(sd.getDate()+(i%5));startDk=dk(sd);
    let vd=new Date(startDk);
    while(dk(vd)<="2026-12-31"){const ch=slot(c,dk(vd),c.d);if(!ch)break;sc[ch].push(c.id);const nd=new Date(ch);nd.setDate(nd.getDate()+freq*7);vd=nd;}
  });

  return sc;
}

// ─── Smart reschedule helpers ─────────────────────────────────────────────────
function getClientDates(clientId,base){return Object.entries(base).filter(([k,ids])=>ids.includes(clientId)).map(([k])=>k).sort();}

function clearRescueFor(swapDate,clientId,ov){
  const next={...ov};
  for(const[k,o] of Object.entries(next)){
    if(o._rescueFor&&o._rescueFor.swapDate===swapDate&&o._rescueFor.clientId===clientId){
      const day={...o};
      day.added=(day.added||[]).filter(id=>id!==clientId);
      if(!day.added.length)delete day.added;
      delete day._rescueFor;
      if(!day.added&&!day.removed?.length&&!Object.keys(day.swaps||{}).length)delete next[k];
      else next[k]=day;
    }
  }
  return next;
}

function findRescueSlot(client,afterDate,currentSched,maxPD){
  const allFuture=WD.filter(d=>dk(d)>afterDate&&dk(d)<="2026-12-31");
  for(const d of allFuture){const k=dk(d),wd=DAYS[d.getDay()-1];if(client.d.length&&!client.d.includes(wd))continue;const cur=currentSched[k]||[];if(cur.includes(client.id))continue;if(cur.length<maxPD)return k;}
  for(const d of allFuture){const k=dk(d),wd=DAYS[d.getDay()-1];if(client.d.length&&!client.d.includes(wd))continue;const cur=currentSched[k]||[];if(!cur.includes(client.id))return k;}
  return null;
}

function applyOverrides(base,ov){
  const sc={};
  for(const[k,ids]of Object.entries(base)){
    if(ACTUAL[k]){sc[k]=[...ids];continue;}
    const o=ov[k]||{};
    let list=[...ids];
    for(const[old,nw]of Object.entries(o.swaps||{})){list=list.map(x=>x===old?nw:x);}
    list=list.filter(x=>!(o.removed||[]).includes(x));
    for(const id of(o.added||[])){if(!list.includes(id))list.push(id);}
    sc[k]=list;
  }
  return sc;
}

function App(){
  const[clients]=useState(()=>RAW.map(c=>({...c})));
  const[wmDays,setWmDays]=useState({...WM_DEF});
  const[biweekly,setBiweekly]=useState(new Set(BW_DEF));
  const[tiers,setTiers]=useState([{min:6000,weeks:5},{min:4000,weeks:8},{min:0,weeks:13}]);
  const[maxPD,setMaxPD]=useState(4);
  const[base,setBase]=useState(null);
  const[ov,setOv]=useState({});
  const[building,setBuilding]=useState(false);
  const[dirty,setDirty]=useState(true);
  const[view,setView]=useState("week");
  const[week,setWeek]=useState(1);
  const[sq,setSq]=useState("");
  const[modal,setModal]=useState(null);

  const totalWeeks=Math.ceil(WD.length/5);
  const cm=useMemo(()=>{const m={};clients.forEach(c=>{m[c.id]=c;});return m;},[clients]);

  useEffect(()=>{rebuild();},[]);
  function rebuild(){setBuilding(true);setTimeout(()=>{setBase(buildBase(clients,{wmDays,biweekly,tiers,maxPD}));setBuilding(false);setDirty(false);},80);}

  const sched=useMemo(()=>base?applyOverrides(base,ov):null,[base,ov]);
  const vc=useMemo(()=>{if(!sched)return{};const v={};for(const ids of Object.values(sched))ids.forEach(id=>{v[id]=(v[id]||0)+1;});return v;},[sched]);
  const tv=useMemo(()=>Object.values(vc).reduce((a,b)=>a+b,0),[vc]);
  const tov=useMemo(()=>Object.values(ov).reduce((n,o)=>n+(o.added?.length||0)+(o.removed?.length||0)+Object.keys(o.swaps||{}).length,0),[ov]);

  function ovSet(dk2,fn){
    if(ACTUAL[dk2])return; // lock actual dates
    setOv(p=>{const day={...(p[dk2]||{})};fn(day);if(!day.added?.length)delete day.added;if(!day.removed?.length)delete day.removed;if(!Object.keys(day.swaps||{}).length)delete day.swaps;const n={...p};if(Object.keys(day).length)n[dk2]=day;else delete n[dk2];return n;});
  }
  function addV(dk2,id){ovSet(dk2,d=>{d.added=[...(d.added||[]).filter(x=>x!==id),id];d.removed=(d.removed||[]).filter(x=>x!==id);});}
  function remV(dk2,id){ovSet(dk2,d=>{if((d.added||[]).includes(id)){d.added=d.added.filter(x=>x!==id);}else if(Object.values(d.swaps||{}).includes(id)){const e=Object.entries(d.swaps||{}).find(([,v])=>v===id);if(e){const s={...d.swaps};delete s[e[0]];d.swaps=s;}}else{d.removed=[...(d.removed||[]).filter(x=>x!==id),id];}});}

  // Smart swap: record the swap AND auto-reschedule the displaced client
  function smartSwap(dk2,oldId,newId){
    if(!base) return;
    const displacedClient=cm[oldId];
    setOv(prev=>{
      // 1. Clear any previous rescue slot for this swap
      let next=clearRescueFor(dk2,oldId,prev);
      // 2. Apply the swap itself
      const day={...(next[dk2]||{})};
      if((day.added||[]).includes(oldId)){
        day.added=day.added.map(x=>x===oldId?newId:x);
      } else {
        const s={...(day.swaps||{})};
        const ex=Object.entries(s).find(([,v])=>v===oldId);
        if(ex)s[ex[0]]=newId; else s[oldId]=newId;
        day.swaps=s;
      }
      if(!day.added?.length)delete day.added;
      if(!Object.keys(day.swaps||{}).length)delete day.swaps;
      next={...next,[dk2]:day};
      // 3. Find rescue slot for displaced client (skip Walmart — fixed day, no reschedule)
      if(!displacedClient||displacedClient.b==="Wal-Mart") return next;
      const tentSched=applyOverrides(base,next);
      const rescueDate=findRescueSlot(displacedClient,dk2,tentSched,maxPD);
      if(!rescueDate) return next;
      // Check if their next base visit already covers it
      const nextBase=getClientDates(oldId,base).find(d=>d>dk2);
      if(nextBase&&rescueDate>=nextBase) return next; // already covered by base schedule
      // 4. Inject rescue visit as an "added" override with a _rescueFor marker
      const rDay={...(next[rescueDate]||{})};
      rDay.added=[...(rDay.added||[]).filter(x=>x!==oldId),oldId];
      rDay._rescueFor={swapDate:dk2,clientId:oldId};
      next={...next,[rescueDate]:rDay};
      return next;
    });
  }

  function undoRem(dk2,id){ovSet(dk2,d=>{d.removed=(d.removed||[]).filter(x=>x!==id);});}

  // Undo a swap: remove swap + remove its rescue slot
  function undoSwap(dk2,oldId){
    setOv(prev=>{
      let next=clearRescueFor(dk2,oldId,prev);
      const day={...(next[dk2]||{})};
      const s={...(day.swaps||{})};
      delete s[oldId];
      if(Object.keys(s).length)day.swaps=s; else delete day.swaps;
      if(!day.added?.length&&!day.removed?.length&&!day.swaps) delete next[dk2];
      else next={...next,[dk2]:day};
      return next;
    });
  }

  function clearDayOv(dk2){
    if(ACTUAL[dk2])return;
    setOv(prev=>{
      let next={...prev};
      for(const[k,o] of Object.entries(next)){
        if(o._rescueFor&&o._rescueFor.swapDate===dk2){
          const day={...o};
          if(day._rescueFor) day.added=(day.added||[]).filter(id=>id!==o._rescueFor.clientId);
          delete day._rescueFor;
          if(!day.added?.length)delete day.added;
          if(!day.added&&!day.removed?.length&&!Object.keys(day.swaps||{}).length)delete next[k];
          else next[k]=day;
        }
      }
      delete next[dk2];
      return next;
    });
  }

  // ── Save / Load overrides ──────────────────────────────────────────────────
  function saveOverrides(){
    const payload={version:1,savedAt:new Date().toISOString(),overrides:ov};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`schedule-overrides-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function loadOverrides(){
    const input=document.createElement("input");
    input.type="file";
    input.accept=".json";
    input.onchange=e=>{
      const file=e.target.files[0];
      if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const payload=JSON.parse(ev.target.result);
          if(payload.version!==1||!payload.overrides) throw new Error("Invalid file");
          setOv(payload.overrides);
          alert(`✓ Loaded ${Object.keys(payload.overrides).length} override day(s) from ${payload.savedAt.slice(0,10)}`);
        }catch(err){alert("Could not load file: "+err.message);}
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // ── Export to Excel ──────────────────────────────────────────────────────────
  function exportExcel(){
    if(!sched||!window.XLSX) return;
    const XL=window.XLSX;

    // ── Sheet 1: Full Schedule (one row per visit per day) ───────────────────
    const schedRows=[["Date","Day","Client ID","Client Name","Banner","City","Prix Net ($)","Type","Notes"]];
    Object.keys(sched).sort().forEach(dateKey=>{
      const ids=sched[dateKey];
      if(!ids||!ids.length) return;
      const d=new Date(dateKey+"T12:00:00");
      const dayName=DAYS[d.getDay()-1];
      const isActual=!!ACTUAL[dateKey];
      const o=ov[dateKey]||{};
      const swapNewIds=new Set(Object.values(o.swaps||{}));
      const isRescue=!!(o._rescueFor);
      ids.forEach(id=>{
        const c=cm[id];
        const isAdded=(o.added||[]).includes(id);
        const isSwappedIn=swapNewIds.has(id);
        const type=isActual?"Actual":isAdded&&isRescue?"Rescheduled":isAdded?"Added":isSwappedIn?"Swapped In":"Generated";
        schedRows.push([
          dateKey, dayName,
          id, c?c.n:id, c?c.b:"?", c?c.c:"",
          c?Math.round(c.p):0,
          type, ""
        ]);
      });
    });

    // ── Sheet 2: Client Summary (visits per client) ──────────────────────────
    const summaryRows=[["Client ID","Client Name","Banner","City","Prix Net ($)","Frequency","Visits 2026","First Visit","Last Visit"]];
    const clientVisits={};
    Object.keys(sched).sort().forEach(dateKey=>{
      (sched[dateKey]||[]).forEach(id=>{
        if(!clientVisits[id]) clientVisits[id]={count:0,first:dateKey,last:dateKey};
        clientVisits[id].count++;
        if(dateKey<clientVisits[id].first) clientVisits[id].first=dateKey;
        if(dateKey>clientVisits[id].last)  clientVisits[id].last=dateKey;
      });
    });
    clients.slice().sort((a,b)=>b.p-a.p).forEach(c=>{
      const v=clientVisits[c.id]||{count:0,first:"",last:""};
      const bw=biweekly.has(c.n.toUpperCase());
      const freq=c.b==="Wal-Mart"?"Weekly":c.b==="Bureau en Gros"?"Quarterly":bw?"Bi-weekly":`Every ${tiers.find(t=>c.p>=t.min)?.weeks||13} weeks`;
      summaryRows.push([c.id,c.n,c.b,c.c,Math.round(c.p),freq,v.count,v.first,v.last]);
    });

    // ── Sheet 3: Weekly Load (visits per week) ───────────────────────────────
    const weekMap={};
    Object.keys(sched).sort().forEach(dateKey=>{
      const d=new Date(dateKey+"T12:00:00");
      // ISO week
      const tmp=new Date(d); tmp.setHours(0,0,0,0); tmp.setDate(tmp.getDate()+3-(tmp.getDay()+6)%7);
      const w1=new Date(tmp.getFullYear(),0,4);
      const wn=1+Math.round(((tmp-w1)/86400000-3+(w1.getDay()+6)%7)/7);
      const wk=`${d.getFullYear()}-W${String(wn).padStart(2,"0")}`;
      if(!weekMap[wk]) weekMap[wk]={week:wk,mon:"",visits:0,actual:0,generated:0};
      if(!weekMap[wk].mon){
        // Monday of that week
        const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
        weekMap[wk].mon=mon.toISOString().slice(0,10);
      }
      const cnt=(sched[dateKey]||[]).length;
      weekMap[wk].visits+=cnt;
      if(ACTUAL[dateKey]) weekMap[wk].actual+=cnt; else weekMap[wk].generated+=cnt;
    });
    const weekRows=[["Week","Week Starting (Mon)","Total Visits","Actual Visits","Generated/Overridden Visits"]];
    Object.values(weekMap).sort((a,b)=>a.week.localeCompare(b.week)).forEach(w=>{
      weekRows.push([w.week,w.mon,w.visits,w.actual,w.generated]);
    });

    // ── Build workbook ───────────────────────────────────────────────────────
    const wb=XL.utils.book_new();

    function makeSheet(rows,freezeRow=1,colWidths=[]){
      const ws=XL.utils.aoa_to_sheet(rows);
      ws["!freeze"]={xSplit:0,ySplit:freezeRow};
      if(colWidths.length) ws["!cols"]=colWidths.map(w=>({wch:w}));
      // Bold header row
      const range=XL.utils.decode_range(ws["!ref"]);
      for(let c=range.s.c;c<=range.e.c;c++){
        const cellRef=XL.utils.encode_cell({r:0,c});
        if(!ws[cellRef]) continue;
        ws[cellRef].s={font:{bold:true},fill:{fgColor:{rgb:"1E3A5F"}},font:{bold:true,color:{rgb:"FFFFFF"}}};
      }
      return ws;
    }

    const ws1=makeSheet(schedRows,1,[12,12,16,36,16,20,13,14,20]);
    const ws2=makeSheet(summaryRows,1,[16,36,16,20,13,16,12,12,12]);
    const ws3=makeSheet(weekRows,1,[12,18,13,14,24]);

    XL.utils.book_append_sheet(wb,ws1,"Full Schedule");
    XL.utils.book_append_sheet(wb,ws2,"Client Summary");
    XL.utils.book_append_sheet(wb,ws3,"Weekly Load");

    XL.writeFile(wb,`schedule-2026-${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  const weekDays=useMemo(()=>{
    if(!sched)return[];
    const st=(week-1)*5;
    // Build from ALL working days including holidays
    const allDays=[];let d=new Date(2026,0,5),end=new Date(2026,11,31);
    while(d<=end){if(d.getDay()>=1&&d.getDay()<=5)allDays.push(new Date(d));d.setDate(d.getDate()+1);}
    return allDays.slice(st,st+5).map(d=>{
      const key=dk(d),o=ov[key]||{};
      const isHoliday=HOLIDAYS.has(key);
      const isActual=!!ACTUAL[key];
      const ids=sched[key]||[];
      const aSet=new Set(o.added||[]),swT=new Set(Object.values(o.swaps||{}));
      // For swapped-in visits, find which original client they replaced
      const swapOrigin={};Object.entries(o.swaps||{}).forEach(([origId,newId])=>{swapOrigin[newId]=origId;});
      // Find rescue slots that came FROM this day's swaps
      const rescueInfo={};// rescueInfo[clientId] = rescueDate for displaced clients
      Object.entries(ov).forEach(([rk,ro])=>{if(ro._rescueFor&&ro._rescueFor.swapDate===key)rescueInfo[ro._rescueFor.clientId]=rk;});
      // Is this day itself a rescue destination?
      const isRescueDest=!!(o._rescueFor);
      return{d,key,dayName:DAYS[d.getDay()-1],label:d.toLocaleDateString('en-CA',{month:'short',day:'numeric'}),
        visits:ids.map(id=>{const c=cm[id];return c?{...c,_a:aSet.has(id),_sw:swT.has(id),_swOrigin:swapOrigin[id],_isRescue:isRescueDest&&(o.added||[]).includes(id)}:{id,n:id,b:"?",c:"",_unknown:true};}).filter(Boolean),
        removed:(o.removed||[]).map(id=>cm[id]).filter(Boolean),
        hasOv:!!(o.added?.length||o.removed?.length||Object.keys(o.swaps||{}).length),
        slots:ids.length, isHoliday, isActual, rescueInfo,
      };
    });
  },[sched,week,ov,cm]);

  // find current week by today's date
  useEffect(()=>{
    const today="2026-02-22"; // current date
    const allDays=[];let d=new Date(2026,0,5),end=new Date(2026,11,31);
    while(d<=end){if(d.getDay()>=1&&d.getDay()<=5)allDays.push(dk(new Date(d)));d.setDate(d.getDate()+1);}
    const idx=allDays.findIndex(k=>k>=today);
    if(idx>=0)setWeek(Math.floor(idx/5)+1);
  },[]);

  const searchRes=useMemo(()=>{
    if(!modal||!modal.search?.trim()||!sched)return[];
    const q=modal.search.toLowerCase();
    const cur=new Set(sched[modal.dateKey]||[]);
    return clients.filter(c=>{
      if(modal.type==="addVisit"&&cur.has(c.id))return false;
      if(modal.type==="swapVisit"&&c.id===modal.oldId)return false;
      return c.n.toLowerCase().includes(q)||c.b.toLowerCase().includes(q)||c.c.toLowerCase().includes(q)||c.a.toLowerCase().includes(q);
    }).slice(0,12);
  },[modal,sched,clients]);

  function PickRow({c,onClick}){
    const col=bc(c.b),v=vc[c.id]||0;
    return(
      <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,marginBottom:4,background:C.bg,border:`1px solid ${C.bd}`,cursor:"pointer",transition:"border-color 0.12s"}}
        onMouseEnter={e=>e.currentTarget.style.borderColor=col} onMouseLeave={e=>e.currentTarget.style.borderColor=C.bd}>
        <div style={{width:3,height:36,borderRadius:2,background:col,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600,color:C.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.n}</div>
          <div style={{fontSize:11,color:C.mu,marginTop:1}}>{c.b} · {c.c}</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:12,fontWeight:700,color:c.p>=6000?C.gn:c.p>=4000?C.ac:C.mu}}>${c.p.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
          <div style={{fontSize:10,color:"#3d5068"}}>{v} visits/yr</div>
        </div>
      </div>
    );
  }

  const nav=[{id:"week",label:"Week View",icon:"📅"},{id:"clients",label:"Clients",icon:"🏪"},{id:"rules",label:"Rules",icon:"⚙️"}];
  const totalAllDays=52*5;

  return(
    <div style={{fontFamily:"'DM Sans',system-ui,sans-serif",minHeight:"100vh",background:C.bg,color:C.tx}}>

      {/* Sidebar */}
      <div style={{width:220,background:C.s1,borderRight:`1px solid ${C.bd}`,display:"flex",flexDirection:"column",padding:"24px 0",position:"fixed",top:0,left:0,height:"100vh",zIndex:10}}>
        <div style={{padding:"0 20px 20px",borderBottom:`1px solid ${C.bd}`,marginBottom:12}}>
          <div style={{fontSize:17,fontWeight:700,color:C.tx,letterSpacing:"-0.5px"}}>Schedule Manager</div>
          <div style={{fontSize:11,color:C.mu,marginTop:2}}>2026 Visit Planner</div>
        </div>
        {nav.map(n=>{const a=view===n.id;return(
          <div key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 20px",cursor:"pointer",fontSize:13,fontWeight:a?600:400,color:a?C.ac:C.mu,background:a?"rgba(56,189,248,0.08)":"transparent",borderLeft:`2px solid ${a?C.ac:"transparent"}`}}>
            <span style={{fontSize:15}}>{n.icon}</span>{n.label}
            {n.id==="week"&&tov>0&&<span style={{marginLeft:"auto",...pill(C.am)}}>{tov}</span>}
          </div>
        );})}
        <div style={{flex:1}}/>
        {/* Legend */}
        <div style={{padding:"0 20px",marginBottom:12}}>
          <div style={{fontSize:10,color:C.mu,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Legend</div>
          {[{col:"#3b82f6",label:"Actual visits (locked)"},{col:C.am,label:"Holidays / off weeks"},{col:C.gn,label:"Generated schedule"}].map(({col,label})=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <div style={{width:10,height:10,borderRadius:2,background:col,flexShrink:0}}/>
              <span style={{fontSize:10,color:C.mu}}>{label}</span>
            </div>
          ))}
        </div>
        <div style={{padding:"0 20px",borderTop:`1px solid ${C.bd}`,paddingTop:14}}>
          <div style={{fontSize:11,color:C.mu,marginBottom:5}}>Status</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:dirty?C.am:building?C.ac:C.gn}}/>
            <span style={{fontSize:12,fontWeight:600,color:dirty?C.am:building?C.ac:C.gn}}>{dirty?"Pending":building?"Building…":"Ready"}</span>
          </div>
          {tov>0&&<div style={{fontSize:11,color:C.am}}>{tov} override{tov!==1?"s":""} active</div>}
        </div>
      </div>

      {/* Main */}
      <div style={{marginLeft:220,padding:"28px 32px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div>
            <div style={{fontSize:22,fontWeight:700,color:C.tx,letterSpacing:"-0.5px"}}>{view==="week"?"Week View":view==="clients"?"Clients":"Rules"}</div>
            <div style={{fontSize:12,color:C.mu,marginTop:3}}>{sched?`${clients.length} clients · ${tv.toLocaleString()} visits · ${Object.keys(ACTUAL).length} actual days locked`:"Loading…"}{tov>0&&<span style={{color:C.am,marginLeft:8}}>· {tov} override{tov!==1?"s":""}</span>}</div>

            {tov>0&&<button onClick={()=>{if(window.confirm("Clear all manual overrides?"))setOv({});}} style={{...btn(C.s2,C.am,C.am+"44"),fontSize:12}}>✕ Clear overrides</button>}
            <div style={{width:1,height:22,background:C.bd,margin:"0 2px"}}/>
            <button onClick={loadOverrides} title="Load saved overrides from a .json file"
              style={{...btn(C.s2,"#94a3b8",C.bd),fontSize:12,display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:14}}>📂</span> Load
            </button>
            <button onClick={saveOverrides} disabled={tov===0} title={tov===0?"No overrides to save":"Save current overrides to a .json file"}
              style={{...btn(tov>0?"#0ea5e9":C.s2,tov>0?"#fff":"#3d5068",tov>0?undefined:C.bd),fontSize:12,display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:14}}>💾</span> Save overrides{tov>0?` (${tov})`:""}
            </button>
            <div style={{width:1,height:22,background:C.bd,margin:"0 2px"}}/>
            <button onClick={exportExcel} disabled={!sched} title="Export full schedule to Excel (.xlsx)"

          </div>
        </div>

        {/* ── WEEK VIEW ── */}
        {view==="week"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
              <button onClick={()=>setWeek(w=>Math.max(1,w-1))} style={{...btn(C.s1,C.mu,C.bd),padding:"6px 14px"}}>‹</button>
              <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:10,flex:1,padding:"10px 20px",textAlign:"center",fontSize:13}}>
                <span style={{color:C.mu}}>Week </span><b>{week}</b><span style={{color:C.mu}}> of 52</span>
                {weekDays[0]&&<span style={{color:C.mu,marginLeft:12}}>{weekDays[0].label} – {weekDays[4]?.label||""}</span>}
              </div>
              <button onClick={()=>setWeek(w=>Math.min(52,w+1))} style={{...btn(C.s1,C.mu,C.bd),padding:"6px 14px"}}>›</button>
            </div>
            <div style={{display:"flex",gap:12}}>
              {weekDays.map(({d,key,dayName,label,visits,removed,hasOv,slots,isHoliday,isActual,rescueInfo})=>{
                const locked=isActual;
                let borderColor=C.bd;
                if(isHoliday)borderColor=C.am+"66";
                else if(isActual)borderColor="#3b82f666";
                else if(hasOv)borderColor=C.am+"66";
                return(
                  <div key={key} style={{flex:1,minWidth:0,background:isHoliday?"#1a1600":C.s1,border:`1px solid ${borderColor}`,borderRadius:10,padding:12,display:"flex",flexDirection:"column",opacity:isHoliday?0.6:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                      <span style={{fontSize:12,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.5px"}}>{dayName}</span>
                      <div style={{display:"flex",gap:3}}>
                        {isHoliday&&<span style={pill(C.am)}>off</span>}
                        {isActual&&!isHoliday&&<span style={pill("#3b82f6")}>actual</span>}
                        {hasOv&&!isActual&&<span style={pill(C.am)}>edited</span>}
                      </div>
                    </div>
                    <div style={{fontSize:11,color:"#475569",marginBottom:9}}>{label}</div>

                    {isHoliday&&<div style={{fontSize:12,color:C.am,fontStyle:"italic",flex:1}}>Holiday / off week</div>}

                    {!isHoliday&&visits.length===0&&removed.length===0&&<div style={{fontSize:12,color:"#2a3a52",fontStyle:"italic"}}>No visits</div>}

                    {!isHoliday&&visits.map(c=>{
                      const col=c._unknown?"#64748b":bc(c.b);
                      const origClient=c._swOrigin?cm[c._swOrigin]:null;
                      const rescDate=c._swOrigin?rescueInfo?.[c._swOrigin]:null;
                      const rescLabel=rescDate?new Date(rescDate+"T12:00:00").toLocaleDateString('en-CA',{month:'short',day:'numeric'}):null;
                      return(
                        <div key={c.id} style={{padding:"7px 9px",borderRadius:7,marginBottom:5,borderLeft:`3px solid ${col}`,background:c._a||c._sw?`${col}22`:`${col}0e`}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:4}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:11,fontWeight:600,color:C.tx,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.n||c.id}</div>
                              <div style={{fontSize:10,color:C.mu,marginTop:1}}>{c.c||""}</div>
                            </div>
                            {!locked&&(
                              <div style={{display:"flex",gap:2,flexShrink:0}}>
                                {c._sw?(
                                  <button title="Undo swap — restore original" onClick={()=>undoSwap(key,c._swOrigin)}
                                    style={{background:C.am+"22",border:`1px solid ${C.am}44`,cursor:"pointer",color:C.am,padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:700}}>↩ undo</button>
                                ):(
                                  <button title="Swap client" onClick={()=>setModal({type:"swapVisit",dateKey:key,label:d.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'}),oldId:c.id,search:""})}
                                    style={{background:C.s2,border:"none",cursor:"pointer",color:"#94a3b8",padding:"2px 6px",borderRadius:4,fontSize:11,fontWeight:700}}>⇄</button>
                                )}
                                {!c._sw&&<button title="Remove visit" onClick={()=>remV(key,c.id)}
                                  style={{background:C.rd+"18",border:"none",cursor:"pointer",color:C.rd,padding:"2px 6px",borderRadius:4,fontSize:11,fontWeight:700}}>×</button>}
                              </div>
                            )}
                          </div>
                          <div style={{marginTop:4,display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
                            {!c._unknown&&<span style={tag(col)}>{c.b}</span>}
                            {isActual&&<span style={pill("#3b82f6")}>actual</span>}
                            {c._a&&!c._isRescue&&<span style={pill(C.gn)}>+ added</span>}
                            {c._isRescue&&<span style={pill("#a78bfa")}>↩ rescheduled</span>}
                            {c._sw&&origClient&&(
                              <span style={{fontSize:10,color:C.am,display:"flex",alignItems:"center",gap:3}}>
                                <span style={pill(C.am)}>⇄ replaces {origClient.n.split(" ").slice(0,2).join(" ")}</span>
                                {rescLabel&&<span style={{color:"#64748b"}}>→ {origClient.n.split(" ").slice(0,2).join(" ")} rescheduled {rescLabel}</span>}
                              </span>
                            )}
                            {c._sw&&!origClient&&<span style={pill(C.am)}>⇄ swapped</span>}
                          </div>
                        </div>
                      );
                    })}

                    {!isHoliday&&removed.map(c=>(
                      <div key={c.id} style={{padding:"6px 9px",borderRadius:7,marginBottom:5,background:C.rd+"0c",borderLeft:`3px solid ${C.rd}55`,opacity:0.7}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:11,color:"#5a6e87",textDecoration:"line-through",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.n}</div>
                            <div style={{fontSize:10,color:"#2a3a52"}}>removed</div>
                          </div>
                          <button onClick={()=>undoRem(key,c.id)} style={{fontSize:11,color:C.ac,background:"transparent",border:"none",cursor:"pointer",padding:"2px 6px",fontWeight:700}}>↩ undo</button>
                        </div>
                      </div>
                    ))}

                    {!isHoliday&&!locked&&(
                      <div style={{marginTop:"auto",paddingTop:8}}>
                        <button onClick={()=>setModal({type:"addVisit",dateKey:key,label:d.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'}),search:""})}
                          style={{width:"100%",padding:"6px",borderRadius:6,border:`1px dashed ${C.bd}`,background:"transparent",color:C.ac,cursor:"pointer",fontSize:12,transition:"all 0.15s",marginBottom:5}}
                          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.ac;e.currentTarget.style.background=C.ac+"10";}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor=C.bd;e.currentTarget.style.background="transparent";}}>
                          + Add visit
                        </button>
                        <div style={{fontSize:10,color:slots>=maxPD?C.rd:C.mu,textAlign:"right"}}>
                          {slots}/{maxPD} slots{slots>maxPD&&" ⚠️"}
                          {hasOv&&<span style={{color:C.am,marginLeft:6,cursor:"pointer",textDecoration:"underline"}} onClick={()=>clearDayOv(key)}>clear edits</span>}
                        </div>
                      </div>
                    )}

                    {locked&&!isHoliday&&(
                      <div style={{marginTop:"auto",paddingTop:6,fontSize:10,color:"#3b82f6",textAlign:"right"}}>🔒 Actual visit — locked</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── CLIENTS ── */}
        {view==="clients"&&sched&&(
          <div>
            <input style={{...inp,maxWidth:380,marginBottom:16}} placeholder="Search client, banner, city…" value={sq} onChange={e=>setSq(e.target.value)}/>
            <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:12,overflow:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr>{["Client","Banner","City","Prix Net","Frequency","Visits 2026","Days",""].map(h=>(
                  <th key={h} style={{padding:"10px 12px",textAlign:"left",color:C.mu,fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:"0.5px",borderBottom:`1px solid ${C.bd}`,whiteSpace:"nowrap"}}>{h}</th>
                ))}</tr></thead>
                <tbody>
                  {clients.filter(c=>{const q=sq.toLowerCase();return!q||c.n.toLowerCase().includes(q)||c.b.toLowerCase().includes(q)||c.c.toLowerCase().includes(q);}).sort((a,b)=>b.p-a.p).map(c=>{
                    const col=bc(c.b),v=vc[c.id]||0;
                    const freq=c.b==="Wal-Mart"?"Weekly":c.b==="Bureau en Gros"?"Quarterly":biweekly.has(c.n.toUpperCase())?"Bi-weekly":`Every ${tiers.find(t=>c.p>=t.min)?.weeks||13}wks`;
                    return(
                      <tr key={c.id} onMouseEnter={e=>e.currentTarget.style.background=C.s2} onMouseLeave={e=>e.currentTarget.style.background=""}>
                        <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.bg}`}}>
                          <div style={{fontWeight:600,color:C.tx,fontSize:12,maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.n}</div>
                          <div style={{fontSize:10,color:"#3d5068"}}>{c.id}</div>
                        </td>
                        <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.bg}`}}><span style={tag(col)}>{c.b}</span></td>
                        <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.bg}`,color:C.mu,fontSize:12,whiteSpace:"nowrap"}}>{c.c}</td>
                        <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.bg}`,fontWeight:600,color:c.p>=6000?C.gn:c.p>=4000?C.ac:C.mu}}>${c.p.toLocaleString(undefined,{maximumFractionDigits:0})}</td>
                        <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.bg}`,fontSize:11,color:C.mu,whiteSpace:"nowrap"}}>{freq}</td>
                        <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.bg}`}}>
                          <span style={{background:v>=10?C.gn+"22":v>=6?C.ac+"22":C.bd,color:v>=10?C.gn:v>=6?C.ac:C.mu,padding:"2px 10px",borderRadius:10,fontSize:12,fontWeight:700}}>{v}</span>
                        </td>
                        <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.bg}`}}>
                          <div style={{display:"flex",gap:3}}>
                            {DAYS.map(d=><span key={d} style={{fontSize:10,padding:"1px 4px",borderRadius:3,background:c.d.includes(d)?"#1e3a5f":C.bg,color:c.d.includes(d)?"#60a5fa":"#2a3a52",border:`1px solid ${c.d.includes(d)?"#1e40af":C.bd}`}}>{d.slice(0,2)}</span>)}
                          </div>
                        </td>
                        <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.bg}`}}>
                          <button onClick={()=>setModal({type:"editClient",client:{...c}})} style={{...btn(C.s2,C.mu,C.bd),padding:"4px 10px",fontSize:11}}>Edit</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── RULES ── */}
        {view==="rules"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:12,padding:"20px 24px"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.tx,marginBottom:14}}>🟠 Walmart Day Assignments</div>
              {Object.entries(wmDays).map(([store,day])=>(
                <div key={store} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9,padding:"9px 12px",background:C.bg,borderRadius:8}}>
                  <span style={{fontSize:12,color:C.tx}}>{store}</span>
                  <select value={day} onChange={e=>{setWmDays(p=>({...p,[store]:e.target.value}));setDirty(true);}} style={{...inp,width:"auto",padding:"4px 8px",color:"#f97316"}}>
                    {DAYS.map(d=><option key={d} value={d}>{d}</option>)}
                  </select>
                </div>
              ))}
            </div>
            <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:12,padding:"20px 24px"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.tx,marginBottom:14}}>📊 Frequency Tiers</div>
              {tiers.map((t,i)=>(
                <div key={i} style={{marginBottom:10,padding:"10px 12px",background:C.bg,borderRadius:8}}>
                  <div style={{display:"flex",gap:8,marginBottom:4}}>
                    <div style={{flex:1}}><div style={{fontSize:11,color:C.mu,marginBottom:4}}>Min Prix Net ($)</div><input type="number" value={t.min} onChange={e=>{setTiers(p=>p.map((x,j)=>j===i?{...x,min:+e.target.value}:x));setDirty(true);}} style={inp}/></div>
                    <div style={{flex:1}}><div style={{fontSize:11,color:C.mu,marginBottom:4}}>Every N weeks</div><input type="number" value={t.weeks} min={1} max={52} onChange={e=>{setTiers(p=>p.map((x,j)=>j===i?{...x,weeks:+e.target.value}:x));setDirty(true);}} style={inp}/></div>
                  </div>
                  <div style={{fontSize:11,color:C.mu}}>→ {Math.ceil(52/t.weeks)} visits/yr</div>
                </div>
              ))}
            </div>
            <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:12,padding:"20px 24px",gridColumn:"1/-1"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.tx,marginBottom:14}}>🟣 Bi-Weekly Stores — click to toggle</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {clients.filter(c=>c.b==="Maxi"||c.b==="Canadian Tire").sort((a,b)=>b.p-a.p).map(c=>{
                  const on=biweekly.has(c.n.toUpperCase());
                  return(<div key={c.id} onClick={()=>{setBiweekly(p=>{const s=new Set(p);on?s.delete(c.n.toUpperCase()):s.add(c.n.toUpperCase());return s;});setDirty(true);}}
                    style={{padding:"9px 12px",background:C.bg,borderRadius:8,border:`1px solid ${on?"#8b5cf644":C.bd}`,cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <span style={{fontSize:12,color:C.tx,flex:1,lineHeight:1.3}}>{c.n}</span>
                      <span style={{...pill(on?"#8b5cf6":C.mu),marginLeft:6,flexShrink:0}}>{on?"Bi-wkly":"Tier"}</span>
                    </div>
                    <div style={{fontSize:11,color:"#475569",marginTop:4}}>${c.p.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
                  </div>);
                })}
              </div>
            </div>
            <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:12,padding:"20px 24px"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.tx,marginBottom:12}}>📅 Daily Capacity</div>
              <div style={{display:"flex",gap:8}}>
                {[3,4,5,6].map(n=>(<button key={n} onClick={()=>{setMaxPD(n);setDirty(true);}} style={{flex:1,padding:"10px",borderRadius:7,border:`1px solid ${maxPD===n?C.ac:C.bd}`,background:maxPD===n?"rgba(56,189,248,0.1)":C.bg,color:maxPD===n?C.ac:C.mu,cursor:"pointer",fontSize:16,fontWeight:700}}>{n}</button>))}
              </div>
              <div style={{fontSize:11,color:C.mu,marginTop:10}}>Working days: {WD.length} (excl. holidays) · Capacity: {maxPD*WD.length} slots/year</div>
            </div>
            <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:12,padding:"20px 24px"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.tx,marginBottom:12}}>📋 Actual Data Summary</div>
              <div style={{fontSize:13,color:C.mu,marginBottom:8}}>Jan 5 – Feb 20, 2026</div>
              <div style={{display:"flex",gap:12}}>
                <div style={{flex:1,background:C.bg,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:700,color:"#3b82f6"}}>{Object.keys(ACTUAL).length}</div>
                  <div style={{fontSize:11,color:C.mu}}>Days with visits</div>
                </div>
                <div style={{flex:1,background:C.bg,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:700,color:"#3b82f6"}}>{Object.values(ACTUAL).reduce((a,b)=>a+b.length,0)}</div>
                  <div style={{fontSize:11,color:C.mu}}>Actual visits</div>
                </div>
                <div style={{flex:1,background:C.bg,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:700,color:C.am}}>{HOLIDAYS.size}</div>
                  <div style={{fontSize:11,color:C.mu}}>Off days</div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ══ ADD VISIT MODAL ══ */}
      {modal?.type==="addVisit"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setModal(null)}>
          <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:14,padding:28,width:520,maxHeight:"88vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
              <div>
                <div style={{fontSize:17,fontWeight:700,color:C.gn}}>+ Add a Visit</div>
                <div style={{fontSize:12,color:C.mu,marginTop:2}}>{modal.label}</div>
                {sched&&(sched[modal.dateKey]||[]).length>=maxPD&&<div style={{marginTop:8,padding:"6px 10px",background:C.am+"18",borderRadius:6,fontSize:12,color:C.am}}>⚠ Day is full — visit will be added as an extra slot</div>}
              </div>
              <button onClick={()=>setModal(null)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.mu,fontSize:18}}>✕</button>
            </div>
            <input autoFocus style={{...inp,marginBottom:10}} placeholder="Search client name, banner, city or address…"
              value={modal.search||""} onChange={e=>setModal(m=>({...m,search:e.target.value}))}/>
            {!modal.search?.trim()&&<div style={{fontSize:12,color:"#3d5068",fontStyle:"italic",padding:"6px 0"}}>Start typing to search all clients…</div>}
            {modal.search?.trim()&&searchRes.length===0&&<div style={{fontSize:12,color:"#3d5068",fontStyle:"italic",padding:"6px 0"}}>No clients match "{modal.search}"</div>}
            <div style={{maxHeight:340,overflowY:"auto"}}>{searchRes.map(c=><PickRow key={c.id} c={c} onClick={()=>{addV(modal.dateKey,c.id);setModal(null);}}/>)}</div>
            <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${C.bd}`,display:"flex",justifyContent:"flex-end"}}>
              <button onClick={()=>setModal(null)} style={btn(C.s2,C.mu,C.bd)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ══ SWAP VISIT MODAL ══ */}
      {modal?.type==="swapVisit"&&(()=>{
        const old=cm[modal.oldId];
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setModal(null)}>
            <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:14,padding:28,width:520,maxHeight:"88vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                <div>
                  <div style={{fontSize:17,fontWeight:700,color:C.am}}>⇄ Swap Visit</div>
                  <div style={{fontSize:12,color:C.mu,marginTop:2}}>{modal.label}</div>
                </div>
                <button onClick={()=>setModal(null)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.mu,fontSize:18}}>✕</button>
              </div>
              {old&&<div style={{padding:"10px 14px",background:C.am+"14",border:`1px solid ${C.am}44`,borderRadius:8,marginBottom:16}}>
                <div style={{fontSize:11,color:C.am,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Replacing:</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:3,height:32,background:bc(old.b),borderRadius:2,flexShrink:0}}/>
                  <div><div style={{fontSize:13,fontWeight:600,color:C.tx}}>{old.n}</div><div style={{fontSize:11,color:C.mu}}>{old.b} · {old.c}</div></div>
                </div>
              </div>}
              <input autoFocus style={{...inp,marginBottom:10}} placeholder="Search replacement client…"
                value={modal.search||""} onChange={e=>setModal(m=>({...m,search:e.target.value}))}/>
              {!modal.search?.trim()&&<div style={{fontSize:12,color:"#3d5068",fontStyle:"italic",padding:"6px 0"}}>Type to search…</div>}
              {modal.search?.trim()&&searchRes.length===0&&<div style={{fontSize:12,color:"#3d5068",fontStyle:"italic",padding:"6px 0"}}>No match</div>}
              <div style={{maxHeight:300,overflowY:"auto"}}>{searchRes.map(c=><PickRow key={c.id} c={c} onClick={()=>{smartSwap(modal.dateKey,modal.oldId,c.id);setModal(null);}}/>)}</div>
              <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${C.bd}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:11,color:"#3d5068"}}>Only this specific day is affected.</div>
                <button onClick={()=>setModal(null)} style={btn(C.s2,C.mu,C.bd)}>Cancel</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ══ EDIT CLIENT MODAL ══ */}
      {modal?.type==="editClient"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setModal(null)}>
          <div style={{background:C.s1,border:`1px solid ${C.bd}`,borderRadius:14,padding:28,width:460}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:C.tx}}>{modal.client.n}</div>
                <div style={{marginTop:4}}><span style={tag(bc(modal.client.b))}>{modal.client.b}</span><span style={{fontSize:12,color:C.mu,marginLeft:8}}>{modal.client.c}</span></div>
              </div>
              <button onClick={()=>setModal(null)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.mu,fontSize:18}}>✕</button>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:C.mu,marginBottom:5}}>Prix Net ($)</div>
              <input type="number" style={inp} defaultValue={modal.client.p} onChange={e=>setModal(m=>({...m,client:{...m.client,p:parseFloat(e.target.value)||0}}))}/>
              <div style={{fontSize:11,color:C.mu,marginTop:4}}>→ {modal.client.b==="Wal-Mart"?"Weekly":modal.client.b==="Bureau en Gros"?"Quarterly":biweekly.has(modal.client.n.toUpperCase())?"Bi-weekly":`Every ${tiers.find(t=>modal.client.p>=t.min)?.weeks||13}wks`}</div>
            </div>
            <div style={{marginBottom:18}}>
              <div style={{fontSize:11,color:C.mu,marginBottom:8}}>Authorized Days</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {DAYS.map(d=>{const on=modal.client.d.includes(d);return(
                  <button key={d} onClick={()=>setModal(m=>({...m,client:{...m.client,d:m.client.d.includes(d)?m.client.d.filter(x=>x!==d):[...m.client.d,d]}}))}
                    style={{padding:"6px 14px",borderRadius:6,fontSize:12,cursor:"pointer",border:`1px solid ${on?C.ac:C.bd}`,background:on?"rgba(56,189,248,0.12)":C.bg,color:on?C.ac:C.mu,fontWeight:on?600:400}}>
                    {d.slice(0,3)}
                  </button>
                );})}
              </div>
            </div>
            {sched&&<div style={{padding:"10px 14px",background:C.bg,borderRadius:8,marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:11,color:C.mu}}>Current visits 2026</div><div style={{fontSize:22,fontWeight:700,color:C.tx}}>{vc[modal.client.id]||0}</div></div>
              <div style={{fontSize:11,color:C.mu,textAlign:"right"}}>Click Rebuild after saving<br/>to recalculate the schedule.</div>
            </div>}
            <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
              <button onClick={()=>setModal(null)} style={btn(C.s2,C.mu,C.bd)}>Cancel</button>
              <button onClick={()=>{setModal(null);setDirty(true);}} style={btn("#0ea5e9")}>Save & Mark Rebuild</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
